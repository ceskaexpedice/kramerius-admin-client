<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content class="mat-typography app-fxLayout app-column app-gap-4 app-form-customize">
  @if (data.message) {
    <div [innerHtml]="data.message "></div>
  }
  @if (data.html) {
    <div [innerHtml]="data.html"></div>
  }
  @if (data.checkbox) {
    <div>
      <mat-checkbox [(ngModel)]="data.checkbox.checked">{{ data.checkbox.label }}</mat-checkbox>
    </div>
  }
  @if (data.numberInput) {
    <mat-form-field appearance="outline" class="app-w-100">
      <mat-label>{{ data.numberInput.label }}</mat-label>
      <input matInput [placeholder]="data.numberInput.label" type="number" step="1" [min]="data.numberInput.min" [max]="data.numberInput.max" [(ngModel)]="data.numberInput.value">
    </mat-form-field>
  }
  @if (data.textInput) {
    <mat-form-field appearance="outline" class="app-w-100">
      <mat-label>{{ data.textInput.label }}</mat-label>
      <input matInput [placeholder]="data.textInput.label" type="text" [(ngModel)]="data.textInput.value">
    </mat-form-field>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton="filled" (click)="onClose(data.btn1.value)" [color]="data.btn1.color">{{ data.btn1.label }}</button>
  @if (data.btn2) {
    <button matButton (click)="onClose(data.btn2.value)" [color]="data.btn2.color">{{ data.btn2.label }}</button>
  }
</mat-dialog-actions>
