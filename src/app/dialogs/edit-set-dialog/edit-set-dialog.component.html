<h2 mat-dialog-title>{{ 'modal.editSet.title' | translate }}</h2>
<mat-dialog-content class="app-fxLayout app-column app-gap-4">
  <mat-form-field appearance="outline" class="app-w-100">
    <mat-label>{{ 'desc.name' | translate }}</mat-label>
    <input type="text" matInput [(ngModel)]="name" [placeholder]="'desc.name' | translate">
  </mat-form-field>
  <mat-form-field appearance="outline" class="app-w-100">
    <mat-label>{{ 'desc.description' | translate }}</mat-label>
    <input type="text" matInput [(ngModel)]="description" [placeholder]="'desc.description' | translate">
  </mat-form-field>
  <mat-form-field appearance="outline" class="app-w-100">
    <mat-label>{{ 'desc.filter' | translate }}</mat-label>
    <input type="text" matInput  [(ngModel)]="filter" [placeholder]="'desc.filter' | translate">
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton="filled" [disabled]="!name || !description || !filter" color="primary" type="submit" (click)="onSave()">{{ 'button.save' | translate }}</button>
  <button matButton  mat-dialog-close="cancel">{{ 'button.cancel' | translate }}</button>
</mat-dialog-actions>
