@if (tree) {
  <div class="app-fxLayout app-row app-center-v" (click)="select()" (dblclick)="open()" [class.app-file]="!tree.file.isDir" [class.app-selected]="tree == imports.selectedTree">
    <div class="app-left" [style]="'flex: 1 1' + (tree.level * 20 + 40) + 'px; max-width:' + (tree.level * 20 + 40) + 'px; min-width:' + (tree.level * 20 + 40) + 'px;'"><!--[fxFlex]="(tree.level * 20 + 40) + 'px'"-->
      @if (tree.loading) {
        <mat-spinner [strokeWidth]="3" [diameter]="20" class="app-mr-2"></mat-spinner>
      }
      @if (tree.expandable() && !tree.loading) {
        <mat-icon class="app-tree-expand" (click)="toggle($event)" class="app-mr-2">{{ tree.expanded ? "expand_more" : "chevron_right" }}</mat-icon>
      }
    </div>
    <div class="app-right">
      {{ tree.file.name }}
    </div>
  </div>
  @if (tree.expanded && tree.children) {
    @for (child of tree.children; track child) {
      <app-tree [tree]="child"></app-tree>
    }
  }
}
